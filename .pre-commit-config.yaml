# Run the same checks CI runs, locally, before each commit.
# Install once: `pip install pre-commit && pre-commit install`
# Run on all files: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy hook omitted — no Python 3.11 on this machine and pydantic-core has no
  # Python 3.14 wheel yet. Run mypy manually: PYTHONPATH=src mypy src
  # CI still runs mypy on Python 3.11 (ubuntu-latest).

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest tests -q
        language: system
        pass_filenames: false
        stages: [pre-push]   # run only on push, not every commit (keeps commits fast)
