services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: ryder-azurite
    command: >
      azurite
      --tableHost 0.0.0.0
      --tablePort 10002
      --location /data
      --skipApiVersionCheck
      --loose
    ports:
      - "10002:10002"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10002"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ryder-app
    depends_on:
      azurite:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Storage config: leave STORAGE_CONNECTION_STRING / STORAGE_ACCOUNT_NAME
      # empty so the app falls back to InMemoryWatermarkStore + InMemoryAuditStore
      # for local testing. To use Azurite instead, set:
      #   STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEEdcAaNsCqXc8Vr+OcEs1J6Wjzr5MhrkjI2A==;TableEndpoint=http://azurite:10002/devstoreaccount1;"
      STORAGE_CONNECTION_STRING: ""
      STORAGE_ACCOUNT_NAME: ""
      # Override the .env path with the container-side mount target so the same
      # .env works on both host and inside the container.
      SNOWFLAKE_PRIVATE_KEY_PATH: /keys/ryder_dev_private.p8
    volumes:
      # Key-pair PEM lives on the host (outside the repo). Mount read-only.
      - C:\Users\apant\snowflake-keys:/keys:ro
      # Mount scripts/ so ad-hoc tools (smoke_snowflake.py) are runnable without
      # rebuilding the image.
      - ./scripts:/app/scripts:ro
    # Default to `trace`; override per-run with:
    #   docker compose run --rm app milestone
    #   docker compose run --rm app cleanup
    #   docker compose run --rm --entrypoint python app scripts/smoke_snowflake.py
    command: ["trace"]

volumes:
  azurite_data:
